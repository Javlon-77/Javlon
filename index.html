<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Smash Ultra - Photo Realistic 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #020204;
        }
        .orbitron-font {
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col justify-between items-center text-white select-none relative">

    <!-- Kosmik chuqurlik foni -->
    <div class="absolute inset-0 bg-cover bg-center opacity-30 pointer-events-none z-0" style="background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1920');"></div>

    <!-- TEPADA: Boshqaruv elementlari -->
    <div class="z-10 mt-6 flex items-center gap-4 bg-black bg-opacity-80 px-6 py-2 rounded-full border border-gray-800 backdrop-blur-md">
        <button onclick="resetPlanet()" class="hover:text-blue-400 transition text-lg px-2" title="Qayta tiklash"><i class="fa-solid fa-rotate-right"></i></button>
        <div class="h-5 w-[1px] bg-gray-700"></div>
        <button onclick="togglePause()" id="pause-btn" class="hover:text-yellow-400 transition text-lg px-2" title="Pauza"><i class="fa-solid fa-pause"></i></button>
    </div>

    <!-- ASOSIY: Haqiqiy 3D Simulyator maydoni -->
    <div class="flex-grow flex items-center justify-center w-full relative z-10">
        <!-- Atmosfera nuri uchun orqa fon glow -->
        <div id="atmos-glow" class="absolute rounded-full pointer-events-none transition-all duration-300" style="width: 440px; height: 440px; background: radial-gradient(circle, rgba(59,130,246,0.3) 60%, rgba(244,63,94,0.1) 80%, rgba(0,0,0,0) 100%); filter: blur(8px);"></div>
        <canvas id="renderCanvas" class="cursor-crosshair relative z-10"></canvas>
    </div>

    <!-- PASTDA: Realistik Statistika Paneli -->
    <div class="z-10 mb-8 flex items-center gap-12 bg-black bg-opacity-90 px-10 py-4 rounded-2xl border border-gray-800 backdrop-blur-lg">
        <div class="flex items-center gap-4">
            <span class="text-blue-400 text-3xl"><i class="fa-solid fa-users"></i></span>
            <div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Aholi (Alive)</p>
                <p id="stat-alive" class="text-2xl font-black orbitron-font text-blue-300">7 b 289 m</p>
            </div>
        </div>
        <div class="h-8 w-[1px] bg-gray-800"></div>
        <div class="flex items-center gap-4">
            <span class="text-red-500 text-3xl"><i class="fa-solid fa-skull-crossbones"></i></span>
            <div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Vafot etganlar (Casualties)</p>
                <p id="stat-dead" class="text-2xl font-black orbitron-font text-red-500">0 m</p>
            </div>
        </div>
    </div>

    <!-- O'NG TOMON: Qurollar -->
    <div class="absolute right-6 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-3 bg-black bg-opacity-80 p-3 rounded-2xl border border-gray-800">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest text-center font-bold mb-1">Qurollar</p>
        <button onclick="setWeapon('laser')" id="w-laser" class="w-12 h-12 bg-gray-950 border-2 border-pink-500 rounded-xl transition flex items-center justify-center text-xl text-pink-500"><i class="fa-solid fa-bolt"></i></button>
        <button onclick="setWeapon('nuke')" id="w-nuke" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-red-500 rounded-xl transition flex items-center justify-center text-xl text-red-500"><i class="fa-solid fa-radiation"></i></button>
        <button onclick="setWeapon('meteor')" id="w-meteor" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-yellow-500 rounded-xl transition flex items-center justify-center text-xl text-yellow-500"><i class="fa-solid fa-meteor"></i></button>
        <button onclick="setWeapon('freeze')" id="w-freeze" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-cyan-400 rounded-xl transition flex items-center justify-center text-xl text-cyan-400"><i class="fa-regular fa-snowflake"></i></button>
    </div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        const R_SIZE = 400; // Sfera o'lchami
        canvas.width = R_SIZE;
        canvas.height = R_SIZE;

        const radius = R_SIZE / 2;
        const cx = radius;
        const cy = radius;

        let totalPopulation = 7289000000;
        let casualties = 0;
        let isPaused = false;
        let rotation = 0;

        let activeWeapon = 'laser';
        let isDrawing = false;

        // 3D yorug'lik yo'nalishi (Quyosh o'ng tomondan tushmoqda)
        const lightDir = { x: 0.8, y: -0.2, z: 0.5 };
        // Normalizatsiya
        const mag = Math.hypot(lightDir.x, lightDir.y, lightDir.z);
        lightDir.x /= mag; lightDir.y /= mag; lightDir.z /= mag;

        // Xaritani procedur ravishda yuqori aniqlikda yaratish (Quruqlik + Shahar chiroqlari)
        const mapW = 1024;
        const mapH = 512;
        const mapCanvas = document.createElement('canvas');
        mapCanvas.width = mapW;
        mapCanvas.height = mapH;
        const mctx = mapCanvas.getContext('2d');

        // Shikastlanish xaritasi (Sayyoradagi teshiklar, magma va muzlar uchun alohida qatlam)
        const damageCanvas = document.createElement('canvas');
        damageCanvas.width = mapW;
        damageCanvas.height = mapH;
        const dctx = damageCanvas.getContext('2d');

        function generateDetailedEarth() {
            // Okean fondi
            mctx.fillStyle = '#051830';
            mctx.fillRect(0, 0, mapW, mapH);

            // Murakkab quruqliklar zanjiri (Yevrosiyo, Afrika, Amerika)
            mctx.fillStyle = '#14421b'; // To'q yashil quruqlik
            
            // Dunyo xaritasi shaklini eslatuvchi relyeflarni chizish
            drawContinent(480, 200, 320, 180, 0.4); // Yevrosiyo
            drawContinent(420, 320, 140, 160, 0.5); // Afrika
            drawContinent(180, 200, 160, 140, 0.4); // Shimoliy Amerika
            drawContinent(240, 360, 110, 150, 0.45); // Janubiy Amerika
            drawContinent(850, 380, 100, 70, 0.3); // Avstraliya

            // Shahar chiroqlari qatlamini quruqlikka qo'shish (Sariq-oltin miltillashlar)
            mctx.fillStyle = 'rgba(255, 215, 0, 0.85)';
            for (let i = 0; i < 450; i++) {
                let rx = Math.random() * mapW;
                let ry = Math.random() * mapH;
                // Faqat quruqlik ustida chiroq yoqish
                let pixel = mctx.getImageData(rx, ry, 1, 1).data;
                if (pixel[1] > 40 && pixel[0] < 50) { 
                    mctx.fillRect(rx, ry, Math.random()*2+1, Math.random()*2+1);
                }
            }
        }

        function drawContinent(x, y, w, h, roughness) {
            mctx.beginPath();
            let steps = 60;
            for (let i = 0; i <= steps; i++) {
                let angle = (i / steps) * Math.PI * 2;
                let rFactor = 1 + (Math.sin(angle * 8) * 0.15) + (Math.random() - 0.5) * roughness;
                let px = x + Math.cos(angle) * (w / 2) * rFactor;
                let py = y + Math.sin(angle) * (h / 2) * rFactor;
                if (i === 0) mctx.moveTo(px, py);
                else mctx.lineTo(px, py);
            }
            mctx.closePath();
            mctx.fill();
        }

        generateDetailedEarth();

        // Kosmik parchalar va otilayotgan lavalar uchun zarrachalar tizimi
        let particles = [];
        class Debris {
            constructor(x, y, vx, vy, color, size) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.color = color;
                this.size = size;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // Gravitatsiya ta'siri
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 3D Sfera Rendereri (Per-pixel ray casting va realistik soya modeli)
        const screenImg = ctx.createImageData(R_SIZE, R_SIZE);
        const mapData = mctx.getImageData(0, 0, mapW, mapH);
        
        function render3DPlanet() {
            const dData = dctx.getImageData(0, 0, mapW, mapH);
            
            for (let y = 0; y < R_SIZE; y++) {
                for (let x = 0; x < R_SIZE; x++) {
                    const idx = (y * R_SIZE + x) * 4;
                    
                    // Sfera koordinatalari
                    const dx = x - cx;
                    const dy = y - cy;
                    const r2 = dx * dx + dy * dy;
                    
                    if (r2 <= radius * radius) {
                        const z = Math.sqrt(radius * radius - r2);
                        
                        // Normal vektor (3D yuza yo'nalishi)
                        const nx = dx / radius;
                        const ny = dy / radius;
                        const nz = z / radius;
                        
                        // 3D Sferik xarita proyeksiyasi (Mercator projection)
                        const lat = Math.asin(ny);
                        const lon = Math.atan2(nx, nz) + rotation;
                        
                        // Tekstura koordinatalari
                        let u = Math.floor(((lon + Math.PI) / (Math.PI * 2)) * mapW);
                        let v = Math.floor(((lat + Math.PI / 2) / Math.PI) * mapH);
                        
                        // Xaritadan chetga chiqib ketmaslik
                        u = (u % mapW + mapW) % mapW;
                        v = Math.max(0, Math.min(mapH - 1, v));
                        
                        const mapIdx = (v * mapW + u) * 4;
                        const dmgIdx = (v * mapW + u) * 4;
                        
                        // Asosiy yer ranglari
                        let r = mapData.data[mapIdx];
                        let g = mapData.data[mapIdx + 1];
                        let b = mapData.data[mapIdx + 2];
                        
                        // Kun va Tun soyasi (Lambertian lighting)
                        const dot = nx * lightDir.x + ny * lightDir.y + nz * lightDir.z;
                        
                        // Shikastlanish/Magma/Muz effektlarini hisoblash
                        const dmgType = dData.data[dmgIdx + 3]; // Alpha kanalda zarar turi yoziladi
                        if (dmgType > 0) {
                            const intens = dData.data[dmgIdx]; // Qizillik darajasi (Magma)
                            const blueIntens = dData.data[dmgIdx + 2]; // Ko'klik darajasi (Muz)
                            
                            if (blueIntens > 200) {
                                // Muzlash effekti
                                r = 150; g = 230; b = 255;
                            } else if (intens > 50) {
                                // Qaynoq magma (Rasmda o'rtada yonib turgan qizil olovli magma)
                                // Animatsiya miltillashi uchun sinus qo'shildi
                                const pulse = 1.0 + Math.sin(Date.now() * 0.01 + u) * 0.15;
                                r = Math.min(255, 240 * pulse);
                                g = Math.min(255, (100 + intens / 2) * pulse);
                                b = 30;
                            } else {
                                // Kuygan qora krater chetlari
                                r = 10; g = 8; b = 10;
                            }
                        }

                        // Yorug'lik hisoblash
                        if (dot >= 0) {
                            // Kun tomoni (3D soya bilan)
                            const factor = 0.15 + dot * 0.85;
                            screenImg.data[idx] = r * factor;
                            screenImg.data[idx + 1] = g * factor;
                            screenImg.data[idx + 2] = b * factor;
                        } else {
                            // Tun tomoni (Oltin rangli shahar chiroqlari faqat shu tomonda porlaydi!)
                            const isCityLight = (r > 200 && g > 170 && b < 100);
                            const terminatorGlow = Math.abs(dot); // Kun va tun chegarasi
                            
                            if (isCityLight && dmgType === 0) {
                                // Shahar chiroqlari tunda yorqin ko'rinadi
                                screenImg.data[idx] = 255;
                                screenImg.data[idx + 1] = 210;
                                screenImg.data[idx + 2] = 50;
                            } else if (terminatorGlow < 0.2 && dmgType === 0) {
                                // Realistik qizil shafaq atmosferasi (terminator liniyasi)
                                const shafaq = (1.0 - terminatorGlow / 0.2);
                                screenImg.data[idx] = r * 0.15 + 180 * shafaq;
                                screenImg.data[idx + 1] = g * 0.15 + 50 * shafaq;
                                screenImg.data[idx + 2] = b * 0.15;
                            } else {
                                // To'liq qorong'ulik
                                screenImg.data[idx] = r * 0.05;
                                screenImg.data[idx + 1] = g * 0.05;
                                screenImg.data[idx + 2] = b * 0.05;
                            }
                        }
                        screenImg.data[idx + 3] = 255;
                    } else {
                        // Koinot (shaffof fon)
                        screenImg.data[idx + 3] = 0;
                    }
                }
            }
            ctx.putImageData(screenImg, 0, 0);
        }

        // Qurol hujumi funksiyasi
        function attack(canvasX, canvasY) {
            const dx = canvasX - cx;
            const dy = canvasY - cy;
            const dist = Math.hypot(dx, dy);

            if (dist < radius) {
                // Sferik proyeksiyaga o'tkazish
                const z = Math.sqrt(radius * radius - dist * dist);
                const lat = Math.asin(dy / radius);
                const lon = Math.atan2(dx, z) + rotation;

                let u = Math.floor(((lon + Math.PI) / (Math.PI * 2)) * mapW);
                let v = Math.floor(((lat + Math.PI / 2) / Math.PI) * mapH);
                u = (u % mapW + mapW) % mapW;

                let kill = 0;
                let craterR = 12;

                // Har xil qurollar uchun maxsus vizual portlashlar
                if (activeWeapon === 'laser') {
                    craterR = 14;
                    kill = Math.floor(Math.random() * 20000000) + 5000000;
                    // Lazer teshigi (Pushti qaynoq lava zaryadi)
                    drawOnDamageMap(u, v, craterR, 'laser');
                    createExplosionEffect(canvasX, canvasY, '#ec4899', 6);
                } 
                else if (activeWeapon === 'nuke') {
                    craterR = 38;
                    kill = Math.floor(Math.random() * 450000000) + 200000000;
                    drawOnDamageMap(u, v, craterR, 'nuke');
                    createExplosionEffect(canvasX, canvasY, '#ff3b00', 30);
                } 
                else if (activeWeapon === 'meteor') {
                    craterR = 25;
                    kill = Math.floor(Math.random() * 120000000) + 40000000;
                    drawOnDamageMap(u, v, craterR, 'meteor');
                    createExplosionEffect(canvasX, canvasY, '#eab308', 18);
                } 
                else if (activeWeapon === 'freeze') {
                    craterR = 30;
                    kill = Math.floor(Math.random() * 15000000) + 2000000;
                    drawOnDamageMap(u, v, craterR, 'freeze');
                    createExplosionEffect(canvasX, canvasY, '#22d3ee', 12);
                }

                if (totalPopulation > 0) {
                    casualties += Math.min(totalPopulation, kill);
                    totalPopulation = Math.max(0, totalPopulation - kill);
                    updateStats();
                }
            }
        }

        // Damage xaritasiga 2D chizish (Aylanish bilan uyg'unlashadi)
        function drawOnDamageMap(u, v, r, type) {
            dctx.save();
            if (type === 'freeze') {
                // Muzlash effekti
                const grad = dctx.createRadialGradient(u, v, 2, u, v, r);
                grad.addColorStop(0, 'rgba(150, 240, 255, 1)');
                grad.addColorStop(0.7, 'rgba(34, 211, 238, 0.9)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                dctx.fillStyle = grad;
                dctx.beginPath();
                dctx.arc(u, v, r, 0, Math.PI * 2);
                dctx.fill();
            } else {
                // Magma va Yadro kuyishi (Rasmda markazda ko'ringan lava effekti)
                const grad = dctx.createRadialGradient(u, v, r * 0.1, u, v, r);
                grad.addColorStop(0, 'rgba(255, 150, 0, 1)'); // Qaynoq magma markazi
                grad.addColorStop(0.5, 'rgba(255, 40, 0, 0.85)');
                grad.addColorStop(0.8, 'rgba(10, 5, 5, 0.95)'); // Kuygan chetlar
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                dctx.fillStyle = grad;
                
                // Kuygan teshik
                dctx.beginPath();
                dctx.arc(u, v, r, 0, Math.PI * 2);
                dctx.fill();
                
                // Lava alpha belgisini o'rnatamiz (Shader uchun)
                dctx.fillStyle = 'rgba(255, 0, 0, 1)'; // Alpha kanalida zarar borligini bildiradi
                dctx.beginPath();
                dctx.arc(u, v, r * 0.8, 0, Math.PI * 2);
                dctx.fill();
            }
            dctx.restore();
        }

        // Olovli bo'laklarning (Debris) atrofga sachrashi
        function createExplosionEffect(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1.5;
                particles.push(new Debris(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 1, // Ozgina yuqoriga harakat
                    color,
                    Math.random() * 3.5 + 1
                ));
            }
        }

        // UI Yangilash
        function updateStats() {
            let aliveB = Math.floor(totalPopulation / 1000000000);
            let aliveM = Math.floor((totalPopulation % 1000000000) / 1000000);
            document.getElementById('stat-alive').innerText = `${aliveB} b ${aliveM} m`;

            let deadB = Math.floor(casualties / 1000000000);
            let deadM = Math.floor((casualties % 1000000000) / 1000000);
            document.getElementById('stat-dead').innerText = deadB > 0 ? `${deadB} b ${deadM} m` : `${deadM} m`;
        }

        // Qurol almashtirish
        function setWeapon(weapon) {
            activeWeapon = weapon;
            document.querySelectorAll('[id^="w-"]').forEach(btn => btn.className = "w-12 h-12 bg-gray-950 border border-gray-800 rounded-xl transition flex items-center justify-center text-xl text-gray-400");
            
            const colors = {
                laser: 'text-pink-500 border-pink-500',
                nuke: 'text-red-500 border-red-500',
                meteor: 'text-yellow-500 border-yellow-500',
                freeze: 'text-cyan-400 border-cyan-400'
            };
            document.getElementById(`w-${weapon}`).className = `w-12 h-12 bg-gray-950 border-2 ${colors[weapon]} rounded-xl transition flex items-center justify-center text-xl`;
        }

        // Voqealar zanjiri
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            attack(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                const rect = canvas.getBoundingClientRect();
                attack(e.clientX - rect.left, e.clientY - rect.top);
            }
        });

        window.addEventListener('mouseup', () => { isDrawing = false; });

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerHTML = isPaused ? '<i class="fa-solid fa-play"></i>' : '<i class="fa-solid fa-pause"></i>';
        }

        function resetPlanet() {
            totalPopulation = 7289000000;
            casualties = 0;
            rotation = 0;
            dctx.clearRect(0, 0, mapW, mapH);
            particles = [];
            updateStats();
        }

        // ASOSIY LOOP (60 FPS animatsiya)
        function animate() {
            if (!isPaused) {
                rotation -= 0.003; // Realistik sekin aylanish
            }

            render3DPlanet();

            // Zarrachalarni yangilash va chizish
            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(idx, 1);
            });

            requestAnimationFrame(animate);
        }

        updateStats();
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Smash Ultra - Watermelon Strike</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #010103;
        }
        .orbitron-font {
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col justify-between items-center text-white select-none relative">

    <!-- Kosmik fon -->
    <div class="absolute inset-0 bg-cover bg-center opacity-25 pointer-events-none z-0" style="background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1920');"></div>

    <!-- TEPADA: Boshqaruv elementlari -->
    <div class="z-10 mt-6 flex flex-col items-center gap-3">
        <div class="flex items-center gap-4 bg-black bg-opacity-80 px-6 py-2 rounded-full border border-gray-800 backdrop-blur-md">
            <button onclick="resetPlanet()" class="hover:text-blue-400 transition text-lg px-2" title="Qayta tiklash"><i class="fa-solid fa-rotate-right"></i></button>
            <div class="h-5 w-[1px] bg-gray-700"></div>
            <button onclick="togglePause()" id="pause-btn" class="hover:text-yellow-400 transition text-lg px-2" title="Pauza"><i class="fa-solid fa-pause"></i></button>
        </div>

        <!-- REJIMLAR (Hujum yoki Aylantirish) -->
        <div class="flex bg-gray-950 p-1 rounded-xl border border-gray-800">
            <button id="mode-attack" onclick="setInteractionMode('attack')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-600 text-white">
                <i class="fa-solid fa-crosshairs mr-1"></i> HUJUM REJIMI
            </button>
            <button id="mode-rotate" onclick="setInteractionMode('rotate')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-gray-400 hover:text-white">
                <i class="fa-solid fa-earth-americas mr-1"></i> AYLANTRISH 🔄
            </button>
        </div>
    </div>

    <!-- ASOSIY: 3D Simulyator Maydoni -->
    <div class="flex-grow flex items-center justify-center w-full relative z-10">
        <!-- Ko'k atmosfera glow -->
        <div id="atmos-glow" class="absolute rounded-full pointer-events-none" style="width: 430px; height: 430px; background: radial-gradient(circle, rgba(59,130,246,0.25) 65%, rgba(59,130,246,0) 80%); filter: blur(6px);"></div>
        <canvas id="renderCanvas" class="cursor-crosshair relative z-10"></canvas>
    </div>

    <!-- PASTDA: Statistika -->
    <div class="z-10 mb-8 flex items-center gap-12 bg-black bg-opacity-90 px-10 py-4 rounded-2xl border border-gray-800 backdrop-blur-lg">
        <div class="flex items-center gap-4">
            <span class="text-blue-400 text-3xl"><i class="fa-solid fa-users"></i></span>
            <div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Aholi (Alive)</p>
                <p id="stat-alive" class="text-2xl font-black orbitron-font text-blue-300">7 b 289 m</p>
            </div>
        </div>
        <div class="h-8 w-[1px] bg-gray-800"></div>
        <div class="flex items-center gap-4">
            <span class="text-red-500 text-3xl"><i class="fa-solid fa-skull-crossbones"></i></span>
            <div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Vafot etganlar (Casualties)</p>
                <p id="stat-dead" class="text-2xl font-black orbitron-font text-red-500">0 m</p>
            </div>
        </div>
    </div>

    <!-- O'NG TOMON: Arsenal -->
    <div class="absolute right-6 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-3 bg-black bg-opacity-80 p-3 rounded-2xl border border-gray-800">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest text-center font-bold mb-1">Arsenal</p>
        <button onclick="setWeapon('watermelon')" id="w-watermelon" class="w-12 h-12 bg-gray-950 border-2 border-yellow-500 rounded-xl transition flex items-center justify-center text-xl text-yellow-500 hover:scale-105 animate-pulse" title="🍉 Tarvuz Hujumi"><i class="fa-solid fa-cookie"></i></button>
        <button onclick="setWeapon('laser')" id="w-laser" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-pink-500 rounded-xl transition flex items-center justify-center text-xl text-pink-500 hover:scale-105" title="⚡ Pushti lazer"><i class="fa-solid fa-bolt"></i></button>
        <button onclick="setWeapon('nuke')" id="w-nuke" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-red-500 rounded-xl transition flex items-center justify-center text-xl text-red-500 hover:scale-105" title="🚀 Yadroviy Raketa"><i class="fa-solid fa-rocket"></i></button>
        <button onclick="setWeapon('meteor')" id="w-meteor" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-yellow-500 rounded-xl transition flex items-center justify-center text-xl text-yellow-500 hover:scale-105" title="☄️ Meteorit"><i class="fa-solid fa-meteor"></i></button>
        <button onclick="setWeapon('freeze')" id="w-freeze" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-cyan-400 rounded-xl transition flex items-center justify-center text-xl text-cyan-400 hover:scale-105" title="❄️ Blizzard"><i class="fa-regular fa-snowflake"></i></button>
        <button onclick="setWeapon('blackhole')" id="w-blackhole" class="w-12 h-12 bg-gray-950 border border-gray-800 hover:border-purple-500 rounded-xl transition flex items-center justify-center text-xl text-purple-500 hover:scale-105" title="🌀 Qora tuynuk"><i class="fa-solid fa-circle-notch animate-spin"></i></button>
    </div>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');

        const R_SIZE = 400; 
        canvas.width = R_SIZE;
        canvas.height = R_SIZE;

        const radius = R_SIZE / 2;
        const cx = radius;
        const cy = radius;

        let totalPopulation = 7289000000;
        let casualties = 0;
        let isPaused = false;
        
        let rotationX = 0; 
        let rotationY = 0; 

        let activeWeapon = 'watermelon'; // Boshlang'ich qurol - yangi tarvuz!
        let interactionMode = 'attack'; 
        let isInteracting = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        const lightDir = { x: 0.8, y: -0.1, z: 0.6 };
        const mag = Math.hypot(lightDir.x, lightDir.y, lightDir.z);
        lightDir.x /= mag; lightDir.y /= mag; lightDir.z /= mag;

        const mapW = 1024;
        const mapH = 512;
        const mapCanvas = document.createElement('canvas');
        mapCanvas.width = mapW;
        mapCanvas.height = mapH;
        const mctx = mapCanvas.getContext('2d');

        const damageCanvas = document.createElement('canvas');
        damageCanvas.width = mapW;
        damageCanvas.height = mapH;
        const dctx = damageCanvas.getContext('2d');

        function generateRealEarthMap() {
            mctx.fillStyle = '#05142a'; 
            mctx.fillRect(0, 0, mapW, mapH);

            mctx.fillStyle = '#103d18'; 

            // 1. Shimoliy Amerika
            mctx.beginPath();
            mctx.moveTo(100, 100); mctx.lineTo(250, 80); mctx.lineTo(320, 120); mctx.lineTo(280, 220);
            mctx.lineTo(200, 220); mctx.lineTo(150, 280); mctx.lineTo(130, 280); mctx.lineTo(170, 220);
            mctx.closePath(); mctx.fill();

            // 2. Janubiy Amerika
            mctx.beginPath();
            mctx.moveTo(240, 310); mctx.lineTo(300, 330); mctx.lineTo(270, 420); mctx.lineTo(250, 480);
            mctx.lineTo(230, 420); mctx.lineTo(220, 350);
            mctx.closePath(); mctx.fill();

            // 3. Yevroosiyo
            mctx.beginPath();
            mctx.moveTo(380, 100); mctx.lineTo(550, 80); mctx.lineTo(800, 100); mctx.lineTo(920, 140);
            mctx.lineTo(880, 280); mctx.lineTo(800, 290); mctx.lineTo(750, 300); mctx.lineTo(650, 250);
            mctx.lineTo(580, 260); mctx.lineTo(500, 230); mctx.lineTo(440, 220); mctx.lineTo(400, 180);
            mctx.closePath(); mctx.fill();

            // 4. Afrika
            mctx.beginPath();
            mctx.moveTo(420, 240); mctx.lineTo(510, 230); mctx.lineTo(560, 270); mctx.lineTo(540, 350);
            mctx.lineTo(490, 440); mctx.lineTo(460, 410); mctx.lineTo(440, 330); mctx.lineTo(400, 280);
            mctx.closePath(); mctx.fill();

            // 5. Avstraliya
            mctx.beginPath();
            mctx.moveTo(760, 350); mctx.lineTo(860, 340); mctx.lineTo(880, 380); mctx.lineTo(840, 410);
            mctx.lineTo(770, 400);
            mctx.closePath(); mctx.fill();

            // 6. Grenlandiya
            mctx.beginPath();
            mctx.moveTo(280, 50); mctx.lineTo(340, 40); mctx.lineTo(320, 90); mctx.lineTo(270, 80);
            mctx.closePath(); mctx.fill();

            mctx.fillStyle = 'rgba(254, 240, 138, 0.95)'; 
            for (let i = 0; i < 600; i++) {
                let rx = Math.random() * mapW;
                let ry = Math.random() * mapH;
                let pixel = mctx.getImageData(rx, ry, 1, 1).data;
                if (pixel[1] > 30 && pixel[0] < 50) { 
                    mctx.fillRect(rx, ry, Math.random() * 2 + 1, Math.random() * 2 + 1);
                }
            }
        }

        generateRealEarthMap();

        let projectiles = [];
        let particles = [];

        class Projectile {
            constructor(startX, startY, targetX, targetY, type) {
                this.startX = startX; this.startY = startY;
                this.x = startX; this.y = startY;
                this.targetX = targetX; this.targetY = targetY;
                this.type = type;
                this.progress = 0;
                this.speed = type === 'watermelon' ? 0.05 : (type === 'nuke' ? 0.03 : 0.04);
            }
            update() {
                this.progress += this.speed;
                this.x = this.startX + (this.targetX - this.startX) * this.progress;
                this.y = this.startY + (this.targetY - this.startY) * this.progress;

                let tailColor = '#f59e0b';
                if (this.type === 'watermelon') tailColor = '#ca8a04';
                else if (this.type === 'nuke') tailColor = '#f43f5e';

                particles.push(new Debris(this.x, this.y, (Math.random() - 0.5) * 1, (Math.random() - 0.5) * 1, tailColor, Math.random() * 2 + 1));

                if (this.progress >= 1) {
                    triggerImpact(this.targetX, this.targetY, this.type);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.save();
                if (this.type === 'watermelon') {
                    // Qora qobiq / Kontur
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 11, 0, Math.PI * 2);
                    ctx.fillStyle = '#000000';
                    ctx.fill();

                    // Oltin-sariq tarvuz tanasi
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 9, 0, Math.PI * 2);
                    ctx.fillStyle = '#facc15'; 
                    ctx.fill();

                    // Vertikal qora/to'q jigarrang chiziqlar (Xuddi rasmdagidek)
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 9, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.strokeStyle = '#713f12';
                    ctx.lineWidth = 2.2;
                    for (let offset = -8; offset <= 8; offset += 4) {
                        ctx.beginPath();
                        ctx.moveTo(this.x + offset, this.y - 12);
                        ctx.lineTo(this.x + offset, this.y + 12);
                        ctx.stroke();
                    }
                    ctx.restore();

                } else if (this.type === 'nuke') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#f43f5e';
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
                } else if (this.type === 'meteor') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#f59e0b';
                    ctx.fillStyle = '#ea580c';
                    ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }

        class Debris {
            constructor(x, y, vx, vy, color, size) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.color = color;
                this.size = size;
                this.life = 1.0;
                this.decay = 0.015 + Math.random() * 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        const screenImg = ctx.createImageData(R_SIZE, R_SIZE);
        const mapData = mctx.getImageData(0, 0, mapW, mapH);
        
        function render3DPlanet() {
            const dData = dctx.getImageData(0, 0, mapW, mapH);
            
            for (let y = 0; y < R_SIZE; y++) {
                for (let x = 0; x < R_SIZE; x++) {
                    const idx = (y * R_SIZE + x) * 4;
                    const dx = x - cx;
                    const dy = y - cy;
                    const r2 = dx * dx + dy * dy;
                    
                    if (r2 <= radius * radius) {
                        const z = Math.sqrt(radius * radius - r2);
                        const nx = dx / radius;
                        const ny = dy / radius;
                        const nz = z / radius;
                        
                        const ry = ny * Math.cos(rotationY) - nz * Math.sin(rotationY);
                        const rz1 = ny * Math.sin(rotationY) + nz * Math.cos(rotationY);
                        const rx = nx * Math.cos(rotationX) - rz1 * Math.sin(rotationX);
                        const rz = nx * Math.sin(rotationX) + rz1 * Math.cos(rotationX);

                        const lat = Math.asin(ry);
                        const lon = Math.atan2(rx, rz);
                        
                        let u = Math.floor(((lon + Math.PI) / (Math.PI * 2)) * mapW);
                        let v = Math.floor(((lat + Math.PI / 2) / Math.PI) * mapH);
                        
                        u = (u % mapW + mapW) % mapW;
                        v = Math.max(0, Math.min(mapH - 1, v));
                        
                        const mapIdx = (v * mapW + u) * 4;
                        const dmgIdx = (v * mapW + u) * 4;
                        
                        let r = mapData.data[mapIdx];
                        let g = mapData.data[mapIdx + 1];
                        let b = mapData.data[mapIdx + 2];
                        
                        const dot = nx * lightDir.x + ny * lightDir.y + nz * lightDir.z;
                        const dmgType = dData.data[dmgIdx + 3];
                        
                        if (dmgType > 0) {
                            const intens = dData.data[dmgIdx];
                            const greenIntens = dData.data[dmgIdx + 1];
                            const blueIntens = dData.data[dmgIdx + 2];
                            
                            if (blueIntens > 200) {
                                r = 130; g = 220; b = 255; 
                            } else if (greenIntens === 111) { 
                                // Tarvuz sharbati va po'stlog'i izi (yashil-qizil shatranj)
                                r = 185; g = 28; b = 28; 
                            } else if (intens > 50) {
                                const pulse = 1.0 + Math.sin(Date.now() * 0.015 + u) * 0.25;
                                r = Math.min(255, 255 * pulse);
                                g = Math.min(255, (100 + intens / 2) * pulse);
                                b = 20; 
                            } else {
                                r = 6; g = 5; b = 6; 
                            }
                        }

                        if (dot >= 0) {
                            const factor = 0.1 + dot * 0.9;
                            screenImg.data[idx] = r * factor;
                            screenImg.data[idx + 1] = g * factor;
                            screenImg.data[idx + 2] = b * factor;
                        } else {
                            const isCityLight = (r > 200 && g > 170 && b < 100);
                            if (isCityLight && dmgType === 0) {
                                screenImg.data[idx] = 255;
                                screenImg.data[idx + 1] = 210;
                                screenImg.data[idx + 2] = 50;
                            } else {
                                screenImg.data[idx] = r * 0.04;
                                screenImg.data[idx + 1] = g * 0.04;
                                screenImg.data[idx + 2] = b * 0.04;
                            }
                        }
                        screenImg.data[idx + 3] = 255;
                    } else {
                        screenImg.data[idx + 3] = 0;
                    }
                }
            }
            ctx.putImageData(screenImg, 0, 0);
        }

        let laserLines = [];
        function attack(canvasX, canvasY) {
            const dx = canvasX - cx;
            const dy = canvasY - cy;
            const dist = Math.hypot(dx, dy);

            if (dist < radius) {
                if (activeWeapon === 'watermelon') {
                    // Osmondan tarvuz tushadi
                    projectiles.push(new Projectile(canvasX - 100, 0, canvasX, canvasY, 'watermelon'));
                } 
                else if (activeWeapon === 'laser') {
                    laserLines.push({ x: canvasX, y: canvasY });
                    triggerImpact(canvasX, canvasY, 'laser');
                } 
                else if (activeWeapon === 'nuke') {
                    projectiles.push(new Projectile(canvasX - 120, 0, canvasX, canvasY, 'nuke'));
                } 
                else if (activeWeapon === 'meteor') {
                    projectiles.push(new Projectile(canvasX + 150, 0, canvasX, canvasY, 'meteor'));
                } 
                else if (activeWeapon === 'freeze' || activeWeapon === 'blackhole' || activeWeapon === 'plasma') {
                    triggerImpact(canvasX, canvasY, activeWeapon);
                }
            }
        }

        function triggerImpact(canvasX, canvasY, type) {
            const dx = canvasX - cx;
            const dy = canvasY - cy;
            const z = Math.sqrt(radius * radius - dx * dx - dy * dy);

            const ry = (dy / radius) * Math.cos(-rotationY) - (z / radius) * Math.sin(-rotationY);
            const rz1 = (dy / radius) * Math.sin(-rotationY) + (z / radius) * Math.cos(-rotationY);
            const rx = (dx / radius) * Math.cos(-rotationX) - rz1 * Math.sin(-rotationX);
            const rz = (dx / radius) * Math.sin(-rotationX) + rz1 * Math.cos(-rotationX);

            const lat = Math.asin(ry);
            const lon = Math.atan2(rx, rz);

            let u = Math.floor(((lon + Math.PI) / (Math.PI * 2)) * mapW);
            let v = Math.floor(((lat + Math.PI / 2) / Math.PI) * mapH);
            u = (u % mapW + mapW) % mapW;

            let r = 12;
            let kill = 0;

            if (type === 'watermelon') {
                r = 35;
                kill = Math.floor(Math.random() * 120000000) + 40000000;
                drawOnDamageMap(u, v, r, 'watermelon');
                // Qizil tarvuz go'shti va qora urug'lari uchib ketadi!
                createWatermelonExplosion(canvasX, canvasY, 30);
            }
            else if (type === 'laser') {
                r = 15;
                kill = Math.floor(Math.random() * 25000000) + 10000000;
                drawOnDamageMap(u, v, r, 'heat');
                createExplosion(canvasX, canvasY, '#ec4899', 5);
            } 
            else if (type === 'nuke') {
                r = 45;
                kill = Math.floor(Math.random() * 500000000) + 250000000;
                drawOnDamageMap(u, v, r, 'heat');
                createExplosion(canvasX, canvasY, '#f43f5e', 45);
            } 
            else if (type === 'meteor') {
                r = 30;
                kill = Math.floor(Math.random() * 180000000) + 70000000;
                drawOnDamageMap(u, v, r, 'heat');
                createExplosion(canvasX, canvasY, '#eab308', 25);
            } 
            else if (type === 'freeze') {
                r = 35;
                kill = Math.floor(Math.random() * 20000000) + 5000000;
                drawOnDamageMap(u, v, r, 'freeze');
                createExplosion(canvasX, canvasY, '#22d3ee', 15);
            }
            else if (type === 'blackhole') {
                r = 50;
                kill = Math.floor(Math.random() * 800000000) + 400000000;
                drawOnDamageMap(u, v, r, 'heat');
                createExplosion(canvasX, canvasY, '#a855f7', 40);
            }

            if (totalPopulation > 0) {
                casualties += Math.min(totalPopulation, kill);
                totalPopulation = Math.max(0, totalPopulation - kill);
                updateStats();
            }
        }

        function drawOnDamageMap(u, v, r, mode) {
            dctx.save();
            if (mode === 'watermelon') {
                // Tarvuz izi (Yashil po'stloq, qizil etak)
                const grad = dctx.createRadialGradient(u, v, r * 0.2, u, v, r);
                grad.addColorStop(0, 'rgba(239, 68, 68, 1)'); // Qizil mag'iz
                grad.addColorStop(0.7, 'rgba(34, 197, 94, 0.9)'); // Yashil po'stloq
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                dctx.fillStyle = grad;
                dctx.beginPath(); dctx.arc(u, v, r, 0, Math.PI*2); dctx.fill();

                // Maxsus marker qo'yamiz (render qilishda yashil-qizil tarvuz effekti chiqishi uchun)
                dctx.fillStyle = 'rgba(0, 111, 0, 0.5)'; 
                dctx.beginPath(); dctx.arc(u, v, r * 0.8, 0, Math.PI*2); dctx.fill();
            }
            else if (mode === 'freeze') {
                const grad = dctx.createRadialGradient(u, v, r * 0.1, u, v, r);
                grad.addColorStop(0, 'rgba(150, 240, 255, 1)');
                grad.addColorStop(0.7, 'rgba(34, 211, 238, 0.9)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                dctx.fillStyle = grad;
                dctx.beginPath(); dctx.arc(u, v, r, 0, Math.PI*2); dctx.fill();
            } else {
                const grad = dctx.createRadialGradient(u, v, r * 0.1, u, v, r);
                grad.addColorStop(0, 'rgba(255, 130, 0, 1)'); 
                grad.addColorStop(0.45, 'rgba(239, 68, 68, 0.9)');
                grad.addColorStop(0.8, 'rgba(10, 5, 5, 0.95)'); 
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                dctx.fillStyle = grad;
                dctx.beginPath(); dctx.arc(u, v, r, 0, Math.PI*2); dctx.fill();
                
                dctx.fillStyle = 'rgba(255, 0, 0, 1)'; 
                dctx.beginPath(); dctx.arc(u, v, r * 0.8, 0, Math.PI*2); dctx.fill();
            }
            dctx.restore();
        }

        function createWatermelonExplosion(x, y, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1.5;
                // Ranglar: qizil (tarvuz eti), yashil (po'stloq), qora (urug'lar)
                const colors = ['#ef4444', '#10b981', '#1e293b', '#f87171'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Debris(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 1.5,
                    color,
                    Math.random() * 4 + 1
                ));
            }
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                particles.push(new Debris(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 1,
                    color,
                    Math.random() * 4 + 1.5
                ));
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            isInteracting = true;
            const rect = canvas.getBoundingClientRect();
            lastMouseX = e.clientX - rect.left;
            lastMouseY = e.clientY - rect.top;

            if (interactionMode === 'attack') {
                attack(lastMouseX, lastMouseY);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isInteracting) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (interactionMode === 'rotate') {
                const deltaX = mouseX - lastMouseX;
                const deltaY = mouseY - lastMouseY;
                rotationX += deltaX * 0.007;
                rotationY += deltaY * 0.007;
            } else if (interactionMode === 'attack') {
                attack(mouseX, mouseY);
            }

            lastMouseX = mouseX;
            lastMouseY = mouseY;
        });

        window.addEventListener('mouseup', () => { 
            isInteracting = false; 
            laserLines = [];
        });

        function setInteractionMode(mode) {
            interactionMode = mode;
            document.getElementById('mode-attack').className = mode === 'attack' ? 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-600 text-white' : 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-gray-400 hover:text-white';
            document.getElementById('mode-rotate').className = mode === 'rotate' ? 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-blue-600 text-white' : 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-gray-400 hover:text-white';
        }

        function updateStats() {
            let aliveB = Math.floor(totalPopulation / 1000000000);
            let aliveM = Math.floor((totalPopulation % 1000000000) / 1000000);
            document.getElementById('stat-alive').innerText = `${aliveB} b ${aliveM} m`;

            let deadB = Math.floor(casualties / 1000000000);
            let deadM = Math.floor((casualties % 1000000000) / 1000000);
            document.getElementById('stat-dead').innerText = deadB > 0 ? `${deadB} b ${deadM} m` : `${deadM} m`;
        }

        function setWeapon(weapon) {
            activeWeapon = weapon;
            setInteractionMode('attack');

            document.querySelectorAll('[id^="w-"]').forEach(btn => btn.className = "w-12 h-12 bg-gray-950 border border-gray-800 rounded-xl transition flex items-center justify-center text-xl text-gray-400 hover:scale-105");
            
            const colors = {
                watermelon: 'text-yellow-500 border-yellow-500',
                laser: 'text-pink-500 border-pink-500',
                nuke: 'text-red-500 border-red-500',
                meteor: 'text-yellow-500 border-yellow-500',
                freeze: 'text-cyan-400 border-cyan-400',
                blackhole: 'text-purple-500 border-purple-500'
            };
            document.getElementById(`w-${weapon}`).className = `w-12 h-12 bg-gray-950 border-2 ${colors[weapon]} rounded-xl transition flex items-center justify-center text-xl hover:scale-105`;
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerHTML = isPaused ? '<i class="fa-solid fa-play"></i>' : '<i class="fa-solid fa-pause"></i>';
        }

        function resetPlanet() {
            totalPopulation = 7289000000;
            casualties = 0;
            rotationX = 0;
            rotationY = 0;
            dctx.clearRect(0, 0, mapW, mapH);
            particles = [];
            projectiles = [];
            updateStats();
        }

        function animate() {
            if (!isPaused && !isInteracting) {
                rotationX -= 0.002; 
            }

            render3DPlanet();

            laserLines.forEach(l => {
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ec4899';
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4 + Math.sin(Date.now() * 0.1) * 2;
                ctx.beginPath(); ctx.moveTo(l.x, 0); ctx.lineTo(l.x, l.y); ctx.stroke();

                ctx.strokeStyle = '#ec4899';
                ctx.lineWidth = 14 + Math.sin(Date.now() * 0.1) * 3;
                ctx.beginPath(); ctx.moveTo(l.x, 0); ctx.lineTo(l.x, l.y); ctx.stroke();
                ctx.restore();
            });
            laserLines = []; 

            projectiles = projectiles.filter(p => {
                const active = p.update();
                if (active) p.draw();
                return active;
            });

            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(idx, 1);
            });

            requestAnimationFrame(animate);
        }

        updateStats();
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Smash - Earth Simulator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #020205;
        }
        .neon-text {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col justify-between items-center text-white select-none relative">

    <!-- Orqa fon koinot -->
    <div class="absolute inset-0 bg-cover bg-center z-0 opacity-45 pointer-events-none" style="background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1920');"></div>

    <!-- TEPADA: Vaqtni Boshqarish Paneli -->
    <div class="z-10 mt-6 flex items-center gap-4 bg-black bg-opacity-80 px-6 py-2.5 rounded-full border border-gray-800 backdrop-blur-md">
        <button onclick="resetSystem()" class="hover:text-blue-400 transition text-lg px-2" title="Yerni Tiklash"><i class="fa-solid fa-rotate-right"></i></button>
        <div class="h-5 w-[1px] bg-gray-700"></div>
        <button onclick="togglePause()" id="pause-btn" class="hover:text-yellow-400 transition text-lg px-2" title="Pauza"><i class="fa-solid fa-pause"></i></button>
        <button onclick="toggleSpeed()" id="speed-btn" class="hover:text-green-400 transition text-lg px-2" title="Tezlik"><i class="fa-solid fa-clock"></i></button>
    </div>

    <!-- ASOSIY: Yer Simulyatori (Canvas) -->
    <div class="flex-grow flex items-center justify-center w-full relative z-10">
        <canvas id="earthCanvas" class="cursor-crosshair drop-shadow-[0_0_60px_rgba(30,58,138,0.4)]"></canvas>
    </div>

    <!-- PASTDA: Statistika (Xuddi rasmdagidek) -->
    <div class="z-10 mb-8 flex items-center gap-8 bg-black bg-opacity-85 px-8 py-3.5 rounded-2xl border border-gray-800 backdrop-blur-lg">
        <!-- Tirik aholi -->
        <div class="flex items-center gap-3">
            <span class="text-blue-400 text-2xl"><i class="fa-solid fa-users"></i></span>
            <div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Aholi (Alive)</p>
                <p id="stat-alive" class="text-xl font-black neon-text text-blue-300">7 b 289 m</p>
            </div>
        </div>

        <div class="h-8 w-[1px] bg-gray-800"></div>

        <!-- Yo'q qilinganlar -->
        <div class="flex items-center gap-3">
            <span class="text-red-500 text-2xl"><i class="fa-solid fa-skull-crossbones"></i></span>
            <div>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Vafot etganlar (Casualties)</p>
                <p id="stat-dead" class="text-xl font-black neon-text text-red-500">0 m</p>
            </div>
        </div>
    </div>

    <!-- O'NG TOMON: Hujum qurollari -->
    <div class="absolute right-6 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-3 bg-black bg-opacity-75 p-3 rounded-2xl border border-gray-800">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest text-center font-bold mb-1">Qurollar</p>
        <button onclick="setAttackTool('laser')" id="tool-laser" class="w-12 h-12 bg-gray-900 border-2 border-pink-500 rounded-xl transition flex items-center justify-center text-xl text-pink-500" title="Lazer nuri"><i class="fa-solid fa-bolt"></i></button>
        <button onclick="setAttackTool('meteor')" id="tool-meteor" class="w-12 h-12 bg-gray-900 border border-gray-800 hover:border-yellow-500 rounded-xl transition flex items-center justify-center text-xl text-yellow-500" title="Meteorit hujumi"><i class="fa-solid fa-meteor"></i></button>
        <button onclick="setAttackTool('nuke')" id="tool-nuke" class="w-12 h-12 bg-gray-900 border border-gray-800 hover:border-red-500 rounded-xl transition flex items-center justify-center text-xl text-red-500" title="Yadroviy zarba"><i class="fa-solid fa-radiation"></i></button>
    </div>

    <script>
        const canvas = document.getElementById('earthCanvas');
        const ctx = canvas.getContext('2d');

        // Canvas o'lchamini moslashtirish
        const size = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.55, 500);
        canvas.width = size;
        canvas.height = size;

        const radius = size * 0.45;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // O'yin parametrlari
        let totalPopulation = 7289000000; // 7b 289m
        let casualties = 0;
        let isPaused = false;
        let timeSpeed = 1;
        
        // Aylanish koordinatalari (Xatolik tuzatilgan qismi)
        let rotationOffsetX = 0; 
        const mapWidth = radius * 4; // Teksturaning aylanma kengligi

        // Yer xaritasi teksturasi
        const earthMap = new Image();
        earthMap.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Earthmap1000x500compac.jpg/640px-Earthmap1000x500compac.jpg';

        let damages = [];
        let isClicking = false;
        let activeTool = 'laser';

        function updateStatsUI() {
            let aliveB = Math.floor(totalPopulation / 1000000000);
            let aliveM = Math.floor((totalPopulation % 1000000000) / 1000000);
            document.getElementById('stat-alive').innerText = `${aliveB} b ${aliveM} m`;

            let deadB = Math.floor(casualties / 1000000000);
            let deadM = Math.floor((casualties % 1000000000) / 1000000);
            if (deadB > 0) {
                document.getElementById('stat-dead').innerText = `${deadB} b ${deadM} m`;
            } else {
                document.getElementById('stat-dead').innerText = `${deadM} m`;
            }
        }

        function drawEarth() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Atmosferaning orqa ko'k nuri
            let backGlow = ctx.createRadialGradient(cx, cy, radius * 0.9, cx, cy, radius * 1.1);
            backGlow.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
            backGlow.addColorStop(1, 'rgba(59, 130, 246, 0)');
            ctx.fillStyle = backGlow;
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 1.1, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            // Yer dairesini kesib olish (Sferik niqob)
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.clip();

            // 2. Teksturani cheksiz barqaror aylantirib chizish (Yo'qolib qolmaslik mantiqi)
            if (earthMap.complete) {
                // X xorijiy koordinatasi doimo [-mapWidth, 0] oralig'ida aylanadi
                let x1 = (rotationOffsetX % mapWidth) - mapWidth;
                ctx.drawImage(earthMap, x1, cy - radius, mapWidth, radius * 2);
                ctx.drawImage(earthMap, x1 + mapWidth, cy - radius, mapWidth, radius * 2);
            } else {
                ctx.fillStyle = '#0f172a';
                ctx.fill();
            }

            // 3. Vayronagarchiliklarni (Kuygan nuqtalar) chizish
            damages.forEach(d => {
                // Hozirgi joylashuvini aylanishga qarab hisoblash
                let currentX = d.initialX + (rotationOffsetX - d.initialOffset);
                
                // Cheksiz aylanish silliq bo'lishi uchun xaritaga bog'laymiz
                let relativeX = ((currentX - cx) % mapWidth);
                if (relativeX < -radius * 2) relativeX += mapWidth;
                if (relativeX > radius * 2) relativeX -= mapWidth;

                let drawX = cx + relativeX;
                let distToCenter = Math.hypot(drawX - cx, d.y - cy);

                // Agar u Yerning ko'rinadigan qismida bo'lsa
                if (distToCenter < radius) {
                    ctx.fillStyle = 'rgba(15, 10, 10, 0.95)';
                    ctx.beginPath();
                    ctx.arc(drawX, d.y, d.r, 0, Math.PI * 2);
                    ctx.fill();

                    // Yonayotgan qizil chekka effekt
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            });

            ctx.restore();

            // 4. Realistik 3D soya (O'ng tomondan yorug'lik)
            let shadowGrad = ctx.createRadialGradient(
                cx + radius * 0.4, cy - radius * 0.2, radius * 0.1,  
                cx, cy, radius * 1.02                                
            );
            shadowGrad.addColorStop(0, 'rgba(255, 255, 255, 0.08)'); 
            shadowGrad.addColorStop(0.3, 'rgba(0, 0, 0, 0.0)');
            shadowGrad.addColorStop(0.75, 'rgba(0, 0, 0, 0.82)');  
            shadowGrad.addColorStop(1, 'rgba(0, 0, 0, 0.98)');

            ctx.fillStyle = shadowGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 1, 0, Math.PI * 2);
            ctx.fill();
        }

        // Hujum qilish
        function attack(x, y) {
            let dist = Math.hypot(x - cx, y - cy);
            if (dist < radius) {
                let r = 0;
                let death = 0;

                if (activeTool === 'laser') {
                    r = 8;
                    death = Math.floor(Math.random() * 8000000) + 2000000;
                    
                    // Lazer nuri effekti
                    ctx.strokeStyle = '#ec4899';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } else if (activeTool === 'meteor') {
                    r = 22;
                    death = Math.floor(Math.random() * 80000000) + 15000000;
                } else if (activeTool === 'nuke') {
                    r = 38;
                    death = Math.floor(Math.random() * 280000000) + 80000000;
                }

                if (totalPopulation > 0) {
                    casualties += Math.min(totalPopulation, death);
                    totalPopulation = Math.max(0, totalPopulation - death);
                    updateStatsUI();
                }

                // Shikast koordinatalari va Yerning aylanma holatini saqlaymiz
                damages.push({
                    initialX: x,
                    y: y,
                    r: r,
                    initialOffset: rotationOffsetX
                });
            }
        }

        // Boshqaruv tugmalari mexanikalari
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerHTML = isPaused ? '<i class="fa-solid fa-play"></i>' : '<i class="fa-solid fa-pause"></i>';
        }

        function toggleSpeed() {
            timeSpeed = timeSpeed === 1 ? 0.3 : 1;
            document.getElementById('speed-btn').style.color = timeSpeed === 0.3 ? '#fbbf24' : '#ffffff';
        }

        function resetSystem() {
            totalPopulation = 7289000000;
            casualties = 0;
            damages = [];
            rotationOffsetX = 0;
            updateStatsUI();
        }

        function setAttackTool(tool) {
            activeTool = tool;
            document.querySelectorAll('[id^="tool-"]').forEach(b => b.className = "w-12 h-12 bg-gray-900 border border-gray-800 rounded-xl transition flex items-center justify-center text-xl text-gray-400");
            
            let color = tool === 'laser' ? 'text-pink-500 border-pink-500' : tool === 'meteor' ? 'text-yellow-500 border-yellow-500' : 'text-red-500 border-red-500';
            document.getElementById(`tool-${tool}`).className = `w-12 h-12 bg-gray-900 border-2 ${color} rounded-xl transition flex items-center justify-center text-xl`;
        }

        // Sichqoncha bosilganda
        canvas.addEventListener('mousedown', (e) => {
            isClicking = true;
            const rect = canvas.getBoundingClientRect();
            attack(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isClicking && activeTool === 'laser') {
                const rect = canvas.getBoundingClientRect();
                attack(e.clientX - rect.left, e.clientY - rect.top);
            }
        });

        window.addEventListener('mouseup', () => { isClicking = false; });

        // Simulyatsiya Tsikli
        function loop() {
            if (!isPaused) {
                // Aylanish qiymatini oshiramiz
                rotationOffsetX -= 0.25 * timeSpeed;
            }
            drawEarth();
            requestAnimationFrame(loop);
        }

        // Ishga tushirish
        updateStatsUI();
        loop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Guest - Kimligingni Top!</title>
    <!-- Tailwind CSS for modern layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti for winning effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle, #1a102f 0%, #050014 100%);
        }
        .neon-title {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            border: 1px solid rgba(168, 85, 247, 0.6);
        }
        .chat-bubble {
            animation: popIn 0.3s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-between p-4 overflow-hidden">

    <!-- Header -->
    <header class="w-full max-w-md text-center mt-4">
        <h1 class="text-3xl font-bold tracking-wider neon-title text-purple-400">MYSTERY GUEST</h1>
        <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Koinot sirlarini fosh et!</p>
    </header>

    <!-- Main Game Box -->
    <main class="w-full max-w-md bg-opacity-20 bg-purple-950 backdrop-blur-md rounded-2xl p-6 neon-border flex flex-col justify-between h-[70vh]">
        
        <!-- Status Bar -->
        <div class="flex justify-between items-center border-b border-purple-800 pb-3 mb-4">
            <div class="flex items-center gap-1">
                <span class="text-xs text-gray-400">IMKONIYAT:</span>
                <span id="hearts" class="text-red-500 tracking-wider">❤️❤️❤️❤️❤️</span>
            </div>
            <div class="text-xs text-gray-400 bg-purple-900 bg-opacity-50 px-2 py-1 rounded">
                BALL: <span id="score" class="text-purple-300 font-bold">0</span>
            </div>
        </div>

        <!-- Chat History -->
        <div id="chat-box" class="flex-grow overflow-y-auto space-y-3 mb-4 pr-1 flex flex-col justify-end">
            <!-- Bot Message -->
            <div class="chat-bubble flex items-start gap-2">
                <div class="bg-purple-600 rounded-full w-8 h-8 flex items-center justify-center text-sm shadow-md">🔮</div>
                <div class="bg-purple-900 bg-opacity-60 text-sm p-3 rounded-2xl rounded-tl-none max-w-[80%] border border-purple-800">
                    Men bir maxfiy qahramon yoki ob'ektni o'yladim. U haqida savol so'ra yoki kimligini taxmin qil!
                </div>
            </div>
        </div>

        <!-- Controls / Input -->
        <div class="space-y-3">
            <!-- Suggestive Tags (Tezkor Savollar) -->
            <div class="flex gap-2 overflow-x-auto pb-1 text-xs">
                <button onclick="askPreset('U tirik odammi?')" class="bg-purple-900 bg-opacity-40 hover:bg-opacity-80 px-3 py-1.5 rounded-full border border-purple-700 whitespace-nowrap transition">Tirikmi? 🧬</button>
                <button onclick="askPreset('U hayoliy qahramonmi?')" class="bg-purple-900 bg-opacity-40 hover:bg-opacity-80 px-3 py-1.5 rounded-full border border-purple-700 whitespace-nowrap transition">Kino/Kitobdanmi? 📚</button>
                <button onclick="askPreset('U haqiqiy hayotda bormi?')" class="bg-purple-900 bg-opacity-40 hover:bg-opacity-80 px-3 py-1.5 rounded-full border border-purple-700 whitespace-nowrap transition">Real hayotdami? 🌍</button>
            </div>

            <!-- Custom Question Form -->
            <form id="question-form" onsubmit="handleQuestion(event)" class="flex gap-2">
                <input id="user-input" type="text" placeholder="Savol bering yoki taxmin qiling..." 
                       class="flex-grow bg-black bg-opacity-50 border border-purple-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white placeholder-gray-500 transition">
                <button type="submit" class="bg-purple-600 hover:bg-purple-500 text-white px-5 rounded-xl transition font-bold shadow-lg flex items-center justify-center text-sm">
                    YUBORISH
                </button>
            </form>
        </div>
    </main>

    <!-- Footer / Reset -->
    <footer class="mb-4">
        <button onclick="startNewGame()" class="text-xs text-purple-400 hover:text-purple-300 transition uppercase tracking-widest border border-purple-800 px-4 py-2 rounded-lg bg-purple-950 bg-opacity-30">
            Yangi O'yinni Boshlash 🔄
        </button>
    </footer>

    <!-- Audio Synthesis API for voices -->
    <script>
        // O'yin ma'lumotlar bazasi (Qahramonlar)
        const characters = [
            { name: "Sherlok Xolms", tags: ["detektiv", "kitob", "kino", "london", "tirikmas", "hayoliy", "aqlli", "shlyapa"] },
            { name: "Cristiano Ronaldo", tags: ["futbolist", "tirik", "real", "sport", "portugaliya", "mashhur", "raqam 7"] },
            { name: "O'rgimchak odam", tags: ["hayoliy", "kino", "tirikmas", "qahramon", "piter parker", "to'r", "superqahramon"] },
            { name: "Stiv Jobs", tags: ["tirikmas", "real", "apple", "iphone", "texnologiya", "asoschi"] },
            { name: "Harry Potter", tags: ["hayoliy", "kino", "kitob", "sehrgar", "tirikmas", "ko'zoynak", "hogvarts"] },
            { name: "Ilon Mask", tags: ["tirik", "real", "milliarder", "tesla", "kosmos", "spacex", "texnologiya"] },
            { name: "Arslon", tags: ["hayvon", "tirik", "real", "sher", "o'rmon", "qirol"] }
        ];

        let secretCharacter = {};
        let lives = 5;
        let score = 0;

        // O'yinni boshlash
        function startNewGame() {
            secretCharacter = characters[Math.floor(Math.random() * characters.length)];
            lives = 5;
            updateHearts();
            document.getElementById('chat-box').innerHTML = `
                <div class="chat-bubble flex items-start gap-2">
                    <div class="bg-purple-600 rounded-full w-8 h-8 flex items-center justify-center text-sm">🔮</div>
                    <div class="bg-purple-900 bg-opacity-60 text-sm p-3 rounded-2xl rounded-tl-none max-w-[80%] border border-purple-800">
                        Yangi o'yin boshlandi! Men bir sirli personajni o'yladim. Qani, toping-chi?
                    </div>
                </div>
            `;
            speak("Yangi o'yin boshlandi! Men tayyorman.");
        }

        // Matnni ovozli o'qish (Web Speech API)
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'uz-UZ'; // Agar o'zbekcha qo'llab-quvvatlanmasa, tizim eng mosini tanlaydi
                utterance.rate = 1.1;
                window.speechSynthesis.speak(utterance);
            }
        }

        // Yurakchalarni yangilash
        function updateHearts() {
            document.getElementById('hearts').innerText = "❤️".repeat(lives) + "💔".repeat(5 - lives);
        }

        // Foydalanuvchi xabari
        function appendUserMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const userMsg = `
                <div class="chat-bubble flex items-start gap-2 justify-end">
                    <div class="bg-purple-800 bg-opacity-90 text-sm p-3 rounded-2xl rounded-tr-none max-w-[80%] border border-purple-600">
                        ${text}
                    </div>
                    <div class="bg-purple-500 rounded-full w-8 h-8 flex items-center justify-center text-sm shadow-md">👤</div>
                </div>
            `;
            chatBox.innerHTML += userMsg;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Botning javobi
        function appendBotMessage(text, isWin = false, isLose = false) {
            const chatBox = document.getElementById('chat-box');
            let emoji = "🔮";
            if(isWin) emoji = "🏆";
            if(isLose) emoji = "💀";

            const botMsg = `
                <div class="chat-bubble flex items-start gap-2">
                    <div class="bg-purple-600 rounded-full w-8 h-8 flex items-center justify-center text-sm shadow-md">${emoji}</div>
                    <div class="bg-purple-900 bg-opacity-60 text-sm p-3 rounded-2xl rounded-tl-none max-w-[80%] border border-purple-800">
                        ${text}
                    </div>
                </div>
            `;
            chatBox.innerHTML += botMsg;
            chatBox.scrollTop = chatBox.scrollHeight;
            speak(text);
        }

        // Tayyor tezkor savollarni yuborish
        function askPreset(questionText) {
            handleLogic(questionText);
        }

        // Savol jo'natilganda
        function handleQuestion(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            handleLogic(text);
            input.value = '';
        }

        // O'yin mantiqiy jarayoni (AI o'rniga aqlli qidiruv algoritmi)
        function handleLogic(text) {
            appendUserMessage(text);
            const query = text.toLowerCase();

            // To'g'ri topilganini tekshirish (Taxmin)
            if (query.includes(secretCharacter.name.toLowerCase()) || (secretCharacter.alias && query.includes(secretCharacter.alias))) {
                appendBotMessage(`URRRAA! 🎉 Siz mutlaqo to'g'ri topdingiz! Men haqiqatdan ham **${secretCharacter.name}**ni o'ylagan edim!`, true);
                triggerWinEffects();
                score += (lives * 10);
                document.getElementById('score').innerText = score;
                return;
            }

            // Agar u o'yinchi shunchaki nom taxmin qilib xato qilgan bo'lsa
            let isAnyCharMatched = characters.some(c => query.includes(c.name.toLowerCase()) && c.name !== secretCharacter.name);
            
            if (isAnyCharMatched) {
                lives--;
                updateHearts();
                if (lives <= 0) {
                    appendBotMessage(`Afsus, siz mag'lub bo'ldingiz! 💀 Men o'ylagan qahramon: **${secretCharacter.name}** edi. Keyingi safar albatta omadingiz keladi!`, false, true);
                    return;
                }
                appendBotMessage(`Yo'q, bu ${text} emas! Bitta imkoniyatingiz kamaydi. Diqqatliroq bo'ling! ❌`);
                return;
            }

            // Savollarga "HA" yoki "YO'Q" javobi mantiqi
            let matched = false;
            for (let tag of secretCharacter.tags) {
                if (query.includes(tag) || (tag === "tirik" && query.includes("yashaydi")) || (tag === "kino" && query.includes("film"))) {
                    matched = true;
                    break;
                }
            }

            setTimeout(() => {
                if (matched) {
                    appendBotMessage("Ha! Savolingizga ijobiy javob beraman. Juda yaqin kelyapsiz... 🤔");
                } else {
                    appendBotMessage("Yo'q, bunday xususiyati yo'q. Boshqa yo'nalishdan izlab ko'ring! 🧐");
                }
            }, 600);
        }

        // G'oliblik salyuti
        function triggerWinEffects() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
        }

        // O'yinni ilk bor yuklash
        window.onload = startNewGame;
    </script>
</body>
</html>
